name = "Spirograph"
description = "Dots trace hypotrochoid curves (spirograph patterns)"
supportsRotation = true

[params.petals]
label = "Petals"
default = 5.0
min = 2.0
max = 12.0
step = 1.0

[position]
x = "cx - ((amplitude * 1.03 - amplitude * 1.03 / petals) * sin(phase - pi()/2) - amplitude * 1.03 / petals * 0.85 * sin((petals - 1) * (phase - pi()/2)))"
y = "cy - ((amplitude * 1.03 - amplitude * 1.03 / petals) * cos(phase - pi()/2) + amplitude * 1.03 / petals * 0.85 * cos((petals - 1) * (phase - pi()/2)))"

[trigger]
value = "fmod(phase - pi()/2 + two_pi(), two_pi()) / two_pi()"

[marker.1]
x = "cx + amplitude * cos(pi() / 2)"
y = "cy - amplitude * sin(pi() / 2)"

[path]
x = "cx - ((amplitude * 1.03 - amplitude * 1.03 / petals) * sin(sweep) - amplitude * 1.03 / petals * 0.85 * sin((petals - 1) * sweep))"
y = "cy - ((amplitude * 1.03 - amplitude * 1.03 / petals) * cos(sweep) + amplitude * 1.03 / petals * 0.85 * cos((petals - 1) * sweep))"
range_min = "0"
range_max = "two_pi()"
