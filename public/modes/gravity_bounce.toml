name = "Gravity Bounce"
description = "Dots bounce with parabolic arcs like balls dropped from varying heights"
supportsRotation = false
isLinear = true

[position]
x = "screenW * 0.08 + t * screenW * 0.84"
y = "screenH * 0.98 - max(0, 1 - 4 * (localT - 0.5) * (localT - 0.5)) * screenH * 0.96"

[trigger]
value = "fmod(cycleProgress * speed, 1.0)"

[marker.1]
x = "screenW * 0.08 + t * screenW * 0.84"
y = "screenH * 0.98"

[path]
x = "screenW * 0.08 + t * screenW * 0.84"
y = "screenH * 0.98 - max(0, 1 - 4 * (sweep - 0.5) * (sweep - 0.5)) * screenH * 0.96"
range_min = "0"
range_max = "1"
