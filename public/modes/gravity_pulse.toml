name = "Gravity Pulse"
description = "Dots pulse outward along evenly-spaced radial spokes and return to center"
supportsRotation = false

[position]
x = "cx + amplitude * sin(pi() * localT) * cos(t * two_pi())"
y = "cy - amplitude * sin(pi() * localT) * sin(t * two_pi())"

[trigger]
value = "localT"

[marker.1]
x = "cx + maxRadius * 0.05 * cos(t * two_pi())"
y = "cy - maxRadius * 0.05 * sin(t * two_pi())"

[path]
x = "cx + amplitude * sin(sweep) * cos(t * two_pi())"
y = "cy - amplitude * sin(sweep) * sin(t * two_pi())"
range_min = "0"
range_max = "pi()"
