name = "Epicycle"
description = "Dots trace loop-the-loop paths with a primary orbit and secondary loops"
supportsRotation = true

[params.loopRatio]
label = "Loops per Orbit"
default = 3.0
min = 1.0
max = 8.0
step = 1.0

[params.loopSize]
label = "Loop Size"
default = 0.30
min = 0.05
max = 0.40

[position]
x = "cx + amplitude * (1 - loopSize) * cos(phase) + amplitude * loopSize * cos(phase * (loopRatio + 1) - loopRatio * pi()/2)"
y = "cy - amplitude * (1 - loopSize) * sin(phase) - amplitude * loopSize * sin(phase * (loopRatio + 1) - loopRatio * pi()/2)"

[trigger]
value = "fmod(phase - pi()/2 + two_pi(), two_pi()) / two_pi()"

[marker.1]
x = "cx + amplitude * cos(pi() / 2)"
y = "cy - amplitude * sin(pi() / 2)"

[path]
x = "cx + amplitude * (1 - loopSize) * cos(sweep) + amplitude * loopSize * cos(sweep * (loopRatio + 1) - loopRatio * pi()/2)"
y = "cy - amplitude * (1 - loopSize) * sin(sweep) - amplitude * loopSize * sin(sweep * (loopRatio + 1) - loopRatio * pi()/2)"
range_min = "0"
range_max = "two_pi()"
