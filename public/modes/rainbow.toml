name = "Rainbow"
description = "Dots travel along concentric semicircular arcs like a rainbow"
supportsRotation = false

[params.sweepMode]
label = "Sweep Mode"
default = 0.0
min = 0.0
max = 1.0
options = [["Bounce", 0.0], ["One Way", 1.0]]

[position]
x = "cx + (min(screenW, screenH) * (0.1 + t * 0.35)) * cos(pi() * (1 - if(sweepMode > 0.5, localT, if(localT < 0.5, localT * 2, (1 - localT) * 2))))"
y = "cy + min(screenW, screenH) * 0.225 - (min(screenW, screenH) * (0.1 + t * 0.35)) * sin(pi() * (1 - if(sweepMode > 0.5, localT, if(localT < 0.5, localT * 2, (1 - localT) * 2))))"

[trigger]
value = "if(sweepMode > 0.5, localT, fmod(cycleProgress * speed * 2, 1.0))"

[marker.1]
x = "cx - min(screenW, screenH) * (0.1 + t * 0.35)"
y = "cy + min(screenW, screenH) * 0.225"

[marker.2]
x = "cx + min(screenW, screenH) * (0.1 + t * 0.35)"
y = "cy + min(screenW, screenH) * 0.225"

[path]
x = "cx + (min(screenW, screenH) * (0.1 + t * 0.35)) * cos(pi() - sweep)"
y = "cy + min(screenW, screenH) * 0.225 - (min(screenW, screenH) * (0.1 + t * 0.35)) * sin(pi() - sweep)"
range_min = "0"
range_max = "pi()"
