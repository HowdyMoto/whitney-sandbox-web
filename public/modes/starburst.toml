name = "Starburst"
description = "Dots pulse outward along evenly-spaced spokes and retract"
supportsRotation = false

[params.pulseShape]
label = "Pulse Shape"
default = 1.0
min = 0.5
max = 3.0

[position]
x = "cx + amplitude * pow(sin(pi() * localT), pulseShape) * cos(t * two_pi())"
y = "cy - amplitude * pow(sin(pi() * localT), pulseShape) * sin(t * two_pi())"

[trigger]
value = "localT"

[marker.1]
x = "cx"
y = "cy"

[path]
x = "cx + amplitude * pow(sin(sweep), pulseShape) * cos(t * two_pi())"
y = "cy - amplitude * pow(sin(sweep), pulseShape) * sin(t * two_pi())"
range_min = "0"
range_max = "pi()"
