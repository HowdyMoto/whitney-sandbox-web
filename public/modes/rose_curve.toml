name = "Rose Curve"
description = "Dots follow rhodonea (rose) curves with configurable petals"
supportsRotation = true

[params.petals]
label = "Petals"
default = 3.0
min = 1.0
max = 12.0
step = 1.0

[position]
x = "cx + amplitude * cos(petals * (phase - pi()/2)) * cos(phase)"
y = "cy - amplitude * cos(petals * (phase - pi()/2)) * sin(phase)"

[trigger]
value = "fmod(localT * petals, 1.0)"

[marker.1]
x = "cx + amplitude * cos(pi() / 2)"
y = "cy - amplitude * sin(pi() / 2)"

[path]
x = "cx + amplitude * cos(petals * (sweep - pi()/2)) * cos(sweep)"
y = "cy - amplitude * cos(petals * (sweep - pi()/2)) * sin(sweep)"
range_min = "0"
range_max = "two_pi()"
